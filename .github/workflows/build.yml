name: Build SquareUp APK

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: stable
          cache: true

      - name: Write local.properties
        run: |
          echo "flutter.sdk=$(which flutter | sed 's|/bin/flutter||')" > android/local.properties
          echo "sdk.dir=$ANDROID_SDK_ROOT" >> android/local.properties
          echo "flutter.buildMode=release" >> android/local.properties
          echo "flutter.versionCode=1" >> android/local.properties
          echo "flutter.versionName=1.0.0" >> android/local.properties
          cat android/local.properties

      - name: Create asset placeholder dirs
        run: |
          mkdir -p assets/sounds
          touch assets/sounds/.keep

      - name: Strip missing font/sound assets from pubspec
        run: |
          python3 - <<'PYEOF'
          import re
          with open('pubspec.yaml', 'r') as f:
              content = f.read()
          # Remove fonts block entirely
          content = re.sub(r'\n  fonts:(\n    .*)+', '', content)
          # Remove assets block and replace with nothing (no custom assets needed)
          content = re.sub(r'\n  assets:(\n    .*)+', '', content)
          with open('pubspec.yaml', 'w') as f:
              f.write(content)
          print("pubspec cleaned")
          PYEOF

      - name: Flutter pub get
        run: flutter pub get

      - name: Make gradlew executable
        run: |
          cd android
          if [ ! -f gradlew ]; then
            gradle wrapper --gradle-version=8.3 || true
          fi
          chmod +x gradlew 2>/dev/null || true

      - name: Build APK (release)
        run: flutter build apk --release --no-tree-shake-icons

      - name: Upload release APK
        uses: actions/upload-artifact@v4
        with:
          name: SquareUp-release
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30

      - name: Build APK (debug fallback)
        if: failure()
        run: flutter build apk --debug --no-tree-shake-icons

      - name: Upload debug APK
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: SquareUp-debug
          path: build/app/outputs/flutter-apk/app-debug.apk
          retention-days: 14
