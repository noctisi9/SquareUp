name: Build Dots & Boxes APK

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: stable
          cache: true

      - name: Create missing asset dirs
        run: |
          mkdir -p assets/sounds
          mkdir -p assets/fonts
          # Create a silent placeholder sound so flutter doesn't fail on missing asset
          touch assets/sounds/.keep

      - name: Patch pubspec to remove missing font assets
        run: |
          # Remove font declarations since we don't have the actual font files
          # Flutter will fall back to system fonts
          python3 - <<'EOF'
          import re
          with open('pubspec.yaml', 'r') as f:
              content = f.read()
          # Remove fonts section
          content = re.sub(r'\n  fonts:.*', '', content, flags=re.DOTALL)
          with open('pubspec.yaml', 'w') as f:
              f.write(content)
          print("pubspec.yaml patched")
          EOF

      - name: Patch pubspec to remove missing sound assets
        run: |
          python3 - <<'EOF'
          with open('pubspec.yaml', 'r') as f:
              content = f.read()
          # Replace assets section to only include the .keep placeholder
          import re
          content = re.sub(
              r'  assets:\n    - assets/sounds/',
              '  assets:\n    - assets/sounds/.keep\n    #',
              content
          )
          with open('pubspec.yaml', 'w') as f:
              f.write(content)
          print("Assets section patched")
          EOF

      - name: Flutter pub get
        run: flutter pub get

      - name: Patch Kotlin/Gradle for compatibility
        run: |
          # Ensure Kotlin DSL compatibility
          if [ -f android/build.gradle ]; then
            sed -i 's/ext.kotlin_version = .*/ext.kotlin_version = "1.9.10"/' android/build.gradle || true
          fi
          if [ -f android/build.gradle.kts ]; then
            sed -i 's/kotlinVersion = .*/kotlinVersion = "1.9.10"/' android/build.gradle.kts || true
          fi

      - name: Enable core library desugaring
        run: |
          APP_GRADLE="android/app/build.gradle"
          APP_GRADLE_KTS="android/app/build.gradle.kts"
          if [ -f "$APP_GRADLE" ]; then
            # Add compileOptions if not present
            if ! grep -q "coreLibraryDesugaringEnabled" "$APP_GRADLE"; then
              sed -i '/android {/a\    compileOptions {\n        coreLibraryDesugaringEnabled true\n        sourceCompatibility JavaVersion.VERSION_17\n        targetCompatibility JavaVersion.VERSION_17\n    }' "$APP_GRADLE" || true
            fi
            # Add desugaring dependency if not present
            if ! grep -q "com.android.tools:desugar_jdk_libs" "$APP_GRADLE"; then
              sed -i '/dependencies {/a\    coreLibraryDesugaring "com.android.tools:desugar_jdk_libs:2.0.4"' "$APP_GRADLE" || true
            fi
          fi

      - name: Build APK (release)
        run: flutter build apk --release --no-shrink

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: dots-and-boxes-release
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30

      - name: Build APK (debug fallback)
        if: failure()
        run: flutter build apk --debug

      - name: Upload debug APK on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: dots-and-boxes-debug
          path: build/app/outputs/flutter-apk/app-debug.apk
          retention-days: 14
